<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Filter - Bootstrap 5</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .slider-container {
            position: relative;
        }
        .slider {
            width: 100%;
        }
        .slider-range {
            position: absolute;
            background-color: #007bff;
            height: 6px;
            border-radius: 5px;
            top: 10px;
        }
    </style>
</head>
<body>
<div class="container my-5">
    <h3>Price Filter</h3>

    <!-- Price Range Filter Section -->
    <div class="row">
        <div class="col-12">
            <label for="price-range" class="form-label">Select Price Range</label>
            <div class="slider-container">
                <!-- Range Sliders -->
                <input type="range" id="min-price" class="slider" min="0" max="1000" step="1" value="100">
                <input type="range" id="max-price" class="slider" min="0" max="1000" step="1" value="500">
                <!-- Range bar indicating the selected range -->
                <div id="slider-range" class="slider-range"></div>
            </div>
        </div>

        <!-- Price Display -->
        <div class="col-12 mt-3">
            <div class="d-flex justify-content-between">
                <span>Price: $<span id="min-price-display">100</span> - $<span id="max-price-display">500</span></span>
            </div>
        </div>
    </div>

    <!-- Example filtered results (this would be dynamic in real use) -->
    <div class="row mt-4">
        <div class="col-12">
            <h5>Filtered Results</h5>
            <p id="filtered-results">Show items between $100 and $500</p>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS (for popper.js support) -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

<script>
    // Get references to the elements
    const minPriceSlider = document.getElementById('min-price');
    const maxPriceSlider = document.getElementById('max-price');
    const minPriceDisplay = document.getElementById('min-price-display');
    const maxPriceDisplay = document.getElementById('max-price-display');
    const filteredResults = document.getElementById('filtered-results');
    const sliderRange = document.getElementById('slider-range');

    // Function to update the price range display and range bar
    function updatePriceRange() {
        const minPrice = parseInt(minPriceSlider.value);
        const maxPrice = parseInt(maxPriceSlider.value);

        // Ensure min price is never greater than max price
        if (minPrice > maxPrice) {
            minPriceSlider.value = maxPrice;
        }

        // Update the displayed price range
        minPriceDisplay.textContent = minPrice;
        maxPriceDisplay.textContent = maxPrice;

        // Update the slider range bar
        const percentageMin = (minPrice / 1000) * 100;
        const percentageMax = (maxPrice / 1000) * 100;
        sliderRange.style.left = `${percentageMin}%`;
        sliderRange.style.width = `${percentageMax - percentageMin}%`;

        // Update filtered results (this would usually trigger a dynamic item filter)
        filteredResults.textContent = `Show items between $${minPrice} and $${maxPrice}`;
    }

    // Event listeners for the sliders
    minPriceSlider.addEventListener('input', updatePriceRange);
    maxPriceSlider.addEventListener('input', updatePriceRange);

    // Initial call to set up the page on load
    updatePriceRange();
</script>
</body>
</html>
