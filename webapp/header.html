<!DOCTYPE html>
<html lang="en">

<head>
    <title>Product Search</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css">


    <!-- Custom Styles -->
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/fa.css" rel="stylesheet">

    <style>
        /* Navbar Styling */
        .navbar {
            background: #ffffff;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            padding: 0.75rem 1.5rem;
        }

        .navbar-brand img {
            height: 28px;
        }

        .nav-link {
            font-size: 1.1rem;
            font-weight: 500;
            color: #333 !important;
            transition: all 0.3s ease-in-out;
        }

        .nav-link:hover {
            color: #0056b3 !important;
            transform: scale(1.05);
        }

        /* Icon Styling */
        .nav-item {
            text-align: center;
        }

        .fa-regular {
            font-size: 1.6rem;
            display: block;
            transition: transform 0.2s ease-in-out, color 0.2s ease-in-out;
        }

        .fa-regular:hover {
            color: #007bff !important;
            transform: scale(1.1);
        }

        /* Small text under icons */
        .nav-label {
            font-size: 0.8rem;
            color: #555;
            margin-top: 2px;
        }

        /* Responsive Navbar */
        @media (max-width: 992px) {
            .navbar-nav {
                text-align: center;
            }

            .nav-link {
                display: inline-block;
                width: 100%;
                padding: 0.75rem 0;
            }
        }

        .fa-xl {
            font-size: 2.75rem;
        }

        .nav-label {
            font-size: large;
            margin: 0 0.5rem;
        }
        /* Logo Container */
.logo {
  display: flex;
  align-items: center;
  font-family: 'Poppins', sans-serif; /* Custom font from Google Fonts */
  font-weight: 700; /* Bold font weight */
  font-size: 2.5rem; /* Increased size for the logo */
  color: #ff5722; /* Vibrant orange color */
}

/* Shopping Cart Icon */
.logo i {
  font-size: 3rem; /* Larger icon size */
  margin-right: 1rem; /* Increased space between icon and text */
  color: #ff5722; /* Match icon color with text */
}

/* Brand Name */
.brand-name {
  text-transform: uppercase; /* Make text uppercase */
  letter-spacing: 1.5px; /* Add more spacing between letters */
  font-size: 2.5rem; /* Larger font size for the brand name */
}

/* Tagline */
.tagline {
  font-size: 1rem; /* Slightly larger font size for tagline */
  color: #666; /* Subtle gray color for tagline */
  font-weight: 400; /* Normal font weight for tagline */
  margin-top: -5px; /* Slight adjustment to bring tagline closer */
}
    </style>

    <!-- jQuery, Axios & Lodash -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light h-100">
        <div class="container-fluid">
            <!-- Left elements -->
            <div class="d-flex">
                <!-- Brand -->
                <!-- <a class="navbar-brand me-2 mb-3 d-flex align-items-center" href="#">
                <img src="assets/images/logo.png" alt="MDB Logo">
            </a> -->
                <!-- Link to Google Fonts -->
                <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">

                <div class="logo">
                    <i class="bi bi-cart"></i> <!-- Shopping cart icon -->
                    <div class = "w-100">
                        <span class="brand-name">The Shopping Site</span>
                        <div class="tagline">Your one-stop shop for everything!</div>
                    </div>
                </div>
            </div>

            <!-- Navbar Toggler (for Mobile) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Search Bar -->
            <div class="col-2"></div>
            <!-- Center elements -->
            <div class="collapse navbar-collapse ms-5" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item mx-5 me-lg-1">
                        <a class="nav-link d-flex align-items-center" href="index.html">
                            <i class="fa-regular fa-home link-primary fa-xl me-2"></i>
                            <span class="nav-label">Home</span>
                        </a>
                    </li>
                    <li class="nav-item mx-5 me-lg-1">
                        <a class="nav-link d-flex align-items-center" href="login.html">
                            <i class="fa-regular fa-door-open link-primary fa-xl me-2"></i>
                            <span class="nav-label">Login</span>
                        </a>
                    </li>
                    <li class="nav-item mx-5 me-lg-1">
                        <a class="nav-link d-flex align-items-center" href="search.html">
                            <i class="fa-regular fa-crate-apple link-primary fa-xl me-2"></i>
                            <span class="nav-label">Search</span>
                        </a>
                    </li>
                    <li class="nav-item mx-5 me-lg-1">
                        <a class="nav-link d-flex align-items-center position-relative" href="cart.html">
                            <i class="fa-regular fa-cart-shopping link-primary fa-xl me-2"></i>
                            <span class="nav-label">Cart</span>
                            <span
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                                id='cart-count' style="font-size: 0.6rem">
                                3
                                <span class="visually-hidden">unread messages</span>
                            </span>
                        </a>

                    </li>
                    <li class="nav-item mx-5 me-lg-1">
                        <a class="nav-link d-flex align-items-center" onclick="logout()">
                            <i class="fa-regular fa-right-from-bracket link-primary fa-xl me-2"></i>
                            <span class="nav-label">Logout</span>
                        </a>
                    </li>
                </ul>
            </div>
            <form class="d-flex input-group w-auto mx-5 ">
                <input type="search" class="form-control fs-4 h-100" placeholder="Search products..."
                    aria-label="Search" id="search-bar" />
                <button class="btn btn-outline-primary" id="search-bar-button">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
            <!-- Right elements (User Profile) -->
            <ul class="navbar-nav flex-row me-5">
                <li class="nav-item mx-5 me-lg-1">
                    <div class="btn-group">
                        <button type="button" class="btn btn-primary username-title"><i
                                class="fa-solid fa-circle-user"></i></button>
                        <button type="button" class="btn btn-primary dropdown-toggle dropdown-toggle-split"
                            data-bs-toggle="dropdown">
                            <span class="visually-hidden">Profile</span>
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                            <li><a class="dropdown-item" href="order_tracking.html" id="order-logged-in">Orders</a></li>
                            <li><a class="dropdown-item" href="order_form.html" id="order-not-logged-in">Track Your
                                    Order</a></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
                        </ul>

                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Bootstrap Scripts -->
    <script>
        loadCartCount()
        $("#search-bar-button").on("click", function (e) {
            e.preventDefault();
            redirect_to_search();
            window.onload = function () {
                let script = document.createElement('script');
                script.src = 'js/bloodhound.min.js'; // Path to your script file
                document.head.appendChild(script);
                script.src = 'js/typeahead.js'; // Path to your script file
                document.head.appendChild(script);
            };
        }
        );
    </script>
</body>

</html>
