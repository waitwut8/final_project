<!DOCTYPE html>
<html lang="en">

<head>
    <title>Product Search</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css">

    <!-- Custom Styles -->
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/fa.css" rel="stylesheet">

    <style>
        /* Navbar Styling */
        .navbar {
            background: #ffffff;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            padding: 0.75rem 1.5rem;
        }

        .navbar-brand img {
            height: 28px;
        }

        .nav-link {
            font-size: 1.1rem;
            font-weight: 500;
            color: #333 !important;
            transition: all 0.3s ease-in-out;
        }

        .nav-link:hover {
            color: #0056b3 !important;
            transform: scale(1.05);
        }

        /* Icon Styling */
        .nav-item {
            text-align: center;
        }

        .fa-regular {
            font-size: 1.6rem;
            display: block;
            transition: transform 0.2s ease-in-out, color 0.2s ease-in-out;
        }

        .fa-regular:hover {
            color: #007bff !important;
            transform: scale(1.1);
        }

        /* Small text under icons */
        .nav-label {
            font-size: 0.8rem;
            color: #555;
            margin-top: 2px;
        }

        /* Responsive Navbar */
        @media (max-width: 992px) {
            .navbar-nav {
                text-align: center;
            }

            .nav-link {
                display: inline-block;
                width: 100%;
                padding: 0.75rem 0;
            }
        }
    </style>

    <!-- jQuery, Axios & Lodash -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid justify-content-between">
        <!-- Left elements -->
        <div class="d-flex">
            <!-- Brand -->
            <a class="navbar-brand me-2 mb-3 d-flex align-items-center" href="#">
                <img src="assets/images/logo.png" alt="MDB Logo">
            </a>
        </div>

        <!-- Navbar Toggler (for Mobile) -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Center elements -->
        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item me-3 me-lg-1">
                    <a class="nav-link" href="index.html">
                        <i class="fa-regular fa-home link-info fa-xl mb-3"></i>
                        <span class="nav-label">Home</span>
                    </a>
                </li>
                <li class="nav-item me-3 me-lg-1">
                    <a class="nav-link" href="login.html">
                        <i class="fa-regular fa-door-open link-info fa-xl mb-3"></i>
                        <span class="nav-label">Login</span>
                    </a>
                </li>
                <li class="nav-item me-3 me-lg-1">
                    <a class="nav-link" href="search.html">
                        <i class="fa-regular fa-crate-apple link-info fa-xl mb-3"></i>
                        <span class="nav-label">Search</span>
                    </a>
                </li>
                <li class="nav-item me-3 me-lg-1">
                    <a class="nav-link" href="cart.html">
                        <i class="fa-regular fa-cart-shopping link-info fa-xl mb-3"></i>
                        <span class="nav-label">Cart</span>
                    </a>
                </li>
                <li class="nav-item me-3 me-lg-1">
                    <a class="nav-link" onclick="logout()">
                        <i class="fa-regular fa-right-from-bracket link-info fa-xl mb-3"></i>
                        <span class="nav-label">Logout</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Right elements (User Profile) -->
        <ul class="navbar-nav flex-row">
            <li class="nav-item me-3 me-lg-1">
                <div class="btn-group">
                    <button type="button" class="btn btn-dark username-title">Welcome, User</button>
                    <button type="button" class="btn btn-dark dropdown-toggle dropdown-toggle-split"
                            data-bs-toggle="dropdown">
                        <span class="visually-hidden">Profile</span>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
                    </ul>
                </div>
            </li>
        </ul>
    </div>
</nav>

<!-- Bootstrap Scripts -->

</body>

</html>
