<!DOCTYPE html>
<html lang="en">

<head>
    <title>Product Search</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css">


    <!-- Custom Styles -->
    <link href="css/styles.css" rel="stylesheet">
    <link href="css/fa.css" rel="stylesheet">

    <style>
        /* Custom light blue color */
        :root {
            --light-blue: #4da6ff;
        }

        /* Shrink navbar padding */
        .navbar {
            padding-top: 0.3rem !important;
            padding-bottom: 0.3rem !important;
        }

        /* Nav link styling */
        .navbar-nav .nav-link {
            color: var(--light-blue) !important;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link:focus {
            color: #1a73e8 !important; /* Slightly darker on hover */
        }

        /* Icons smaller and light blue */
        .navbar-nav .fa-regular,
        .navbar-nav .fa-solid {
            font-size: 1.1rem;
            color: var(--light-blue);
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .navbar-nav .nav-link:hover .fa-regular,
        .navbar-nav .nav-link:hover .fa-solid {
            color: #1a73e8;
            transform: scale(1.1);
        }

        /* Smaller horizontal spacing on nav items */
        .navbar-nav .nav-item {
            margin-left: 0.5rem !important;
            margin-right: 0.5rem !important;
        }

        /* Search form smaller input and button */
        form.d-flex input#search-bar {
            font-size: 0.85rem;
            height: 32px; /* smaller input */
        }

        form.d-flex button#search-bar-button {
            font-size: 0.9rem;
            height: 32px;
            border-color: var(--light-blue);
            color: var(--light-blue);
        }

        form.d-flex button#search-bar-button:hover {
            background-color: var(--light-blue);
            color: white;
        }

        /* Dropdown menu link colors */
        .dropdown-menu a.dropdown-item {
            color: var(--light-blue);
            font-size: 0.9rem;
        }

        .dropdown-menu a.dropdown-item:hover {
            background-color: #cce5ff;
            color: #004085;
        }

        /* Username button smaller and blue */
        .btn-primary.dropdown-toggle {
            background-color: var(--light-blue);
            border-color: var(--light-blue);
            font-size: 0.9rem;
            padding: 0.25rem 0.5rem;
        }

        .btn-primary.dropdown-toggle:hover {
            background-color: #1a73e8;
            border-color: #1a73e8;
        }

        /* Shrink logo image */
        .navbar-brand img {
            max-height: 32px;
            width: auto;
        }
    </style>

    <!-- jQuery, Axios & Lodash -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-2">
    <div class="container-fluid">
        <!-- Logo and brand -->



                    <img class = "img-fluid" src="assets/img.png">




        <!-- Toggler -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible content -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Navbar links -->
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 text-center">
                <li class="nav-item mx-lg-3 my-1 my-lg-0">
                    <a class="nav-link d-flex align-items-center justify-content-center" href="index.html">
                        <i class="fa-regular fa-home fa-xl me-1"></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="nav-item mx-lg-3 my-1 my-lg-0">
                    <a class="nav-link d-flex align-items-center justify-content-center" href="login.html">
                        <i class="fa-regular fa-door-open fa-xl me-1"></i>
                        <span>Login</span>
                    </a>
                </li>
                <li class="nav-item mx-lg-3 my-1 my-lg-0">
                    <a class="nav-link d-flex align-items-center justify-content-center" href="search.html">
                        <i class="fa-regular fa-crate-apple fa-xl me-1"></i>
                        <span>Search</span>
                    </a>
                </li>
                <li class="nav-item mx-lg-3 my-1 my-lg-0 position-relative">
                    <a class="nav-link d-flex align-items-center justify-content-center" href="cart.html">
                        <i class="fa-regular fa-cart-shopping fa-xl me-1"></i>
                        <span>Cart</span>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              id="cart-count" style="font-size: 0.6rem;">
              3
              <span class="visually-hidden">items in cart</span>
            </span>
                    </a>
                </li>
                <li class="nav-item mx-lg-3 my-1 my-lg-0">
                    <a class="nav-link d-flex align-items-center justify-content-center" href="#" onclick="logout()">
                        <i class="fa-regular fa-right-from-bracket fa-xl me-1"></i>
                        <span>Logout</span>
                    </a>
                </li>
            </ul>

            <!-- Search form -->
            <form class="d-flex mt-3 mt-lg-0 ms-lg-3 w-100 w-lg-auto" role="search">
                <input class="form-control me-2" type="search" placeholder="Search products..." aria-label="Search" id="search-bar">
                <button class="btn btn-outline-primary" id="search-bar-button" type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>

            <!-- User profile dropdown -->
            <ul class="navbar-nav ms-lg-3 mt-3 mt-lg-0">
                <li class="nav-item dropdown">
                    <button class="btn btn-primary dropdown-toggle d-flex align-items-center" id="profileDropdown"
                            data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fa-solid fa-circle-user me-1"></i> Username
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                        <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                        <li><a class="dropdown-item" href="order_tracking.html" id="order-logged-in">Orders</a></li>
                        <li><a class="dropdown-item" href="order_form.html" id="order-not-logged-in">Track Your Order</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>


<!-- Bootstrap Scripts -->
    <script>
        loadCartCount()
        $("#search-bar-button").on("click", function (e) {
            e.preventDefault();
            redirect_to_search();
            window.onload = function () {
                let script = document.createElement('script');
                script.src = 'js/bloodhound.min.js'; // Path to your script file
                document.head.appendChild(script);
                script.src = 'js/typeahead.js'; // Path to your script file
                document.head.appendChild(script);
            };
        }
        );
    </script>
</body>

</html>
