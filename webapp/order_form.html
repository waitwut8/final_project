<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking</title>
    <link href="css/styles.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        header {
            background-color: #007bff;
            color: white;
            padding: 20px 0;
            text-align: center;
        }

        main {
            margin-top: 50px;
        }

        #tracking-form {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        #order-status {
            margin-top: 20px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.css" />
</head>

<body>

    <div id="header"></div>
    <header>
        <h1>Order Tracking Form</h1>
    </header>
    <div class = "mx-5 my-5 border border-primary">
        <form id="tracking-form">
            <div class="mb-3">
                <label for="order-id" class="form-label">Order ID</label>
                <input type="text" class="form-control" id="order-track-input" placeholder="Enter your Order ID" required>
            </div>
            
            <p class="hidden text-warning mx-1" id="order-message" style="font-size: 0.9rem; font-weight: bold;">
                <i class="fas fa-circle-question"></i> Order ID not found, try again?
            </p>
            <button type="submit" class="btn btn-primary" id = "order-track-submit">Track Order</button>
        </form>
    <table id="order-table" class = "display compact">
        <thead>
        <tr>
            
            <th>Items</th>
            <th>Date</th>
            <th>Price</th>
            <th>Delivery Status</th>
        </tr>
    </thead>
        
            
        
    </table>
</div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.3.0-alpha1/js/bootstrap.min.js"></script>
    

    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.js"></script>
    <script src="js/scripts.js"></script>
    <script src = "js/order_form.js"></script>
</body>

</html>
