    <!-- Primary Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="title" content="AdminLTE | Dashboard v3">
    <meta name="description" content="AdminLTE is a Free Bootstrap 5 Admin Dashboard, 30 example pages using Vanilla JS.">

    <!-- Fonts -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" integrity="sha256-tXJfXfp6Ewt1ilPzLDtQnJV4hclT9XuaZUKyUvmyr+Q=" crossorigin="anonymous">

    <!-- Bootstrap & AdminLTE Styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/adminlte.css">



    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/apexcharts@3.37.1/dist/apexcharts.css">

    <!-- Custom Styles -->
    <style>
        /* General Styles */
        body {
            font-family: 'Source Sans 3', sans-serif;
            background-color: #f4f6f9;
        }

        .app-header, .app-footer {
            background-color: #343a40;
            color: white;
        }

        /* Sidebar */
        .app-sidebar {
            background-color: #212529;
            color: white;
        }

        .brand-link {
            color: #ffffff;
        }

        .app-sidebar .sidebar-brand a:hover {
            text-decoration: underline;
        }

        .nav-link {
            color: #ffffff;
            transition: color 0.3s ease-in-out;
        }

        .nav-link:hover {
            color: #007bff;
        }

        .sidebar-brand {
            margin-bottom: 20px;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            background-color: #f8f9fa;
            border-bottom: 2px solid #ddd;
            font-weight: 500;
        }

        .card-body {
            padding: 20px;
        }

        .fw-bold {
            font-weight: 600;
        }

        .fs-5 {
            font-size: 1.25rem;
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 300px;
        }

        /* Footer */
        .app-footer {
            text-align: center;
            padding: 10px;
            background-color: #343a40;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">

<div class="app-wrapper">
    <!-- Header -->
    
    <div id="admin-header" class = "bg-black"></div>

    <!-- Sidebar -->
    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
        <div class="sidebar-brand">
            <a href="admin_index.html" class="brand-link d-flex align-items-center">
                <i class="bi bi-house-door-fill me-2"></i> <!-- House Icon for "Administration" -->
                <span class="brand-text fw-light">Administration</span>
            </a>
        </div>

        <div class="sidebar-brand">
            <a href="order_index.html" class="d-flex align-items-center">
                <i class="bi bi-cart-fill me-2"></i> <!-- Cart Icon for "Order Control" -->
                <span class="brand-text fw-light">Order Control</span>
            </a>
        </div>

        <div class="sidebar-brand">
            <a href="admin_user.html" class="d-flex align-items-center">
                <i class="bi bi-person-fill me-2"></i> <!-- Person Icon for "User Management" -->
                <span class="brand-text fw-light">User Management</span>
            </a>
        </div>

        <div class="sidebar-brand">
            <a href="admin_product.html" class="d-flex align-items-center">
                <i class="bi bi-box-fill me-2"></i> <!-- Box Icon for "Product Management" -->
                <span class="brand-text fw-light">Product Management</span>
            </a>
        </div>
    </aside>

    <!-- Include Bootstrap Icons if not already done -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">


    <!-- Main Content -->
    <main class="app-main">
        <div class="app-content-header">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-sm-6">
                        <h3 class="mb-0">Dashboard v3</h3>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-end">
                            <li class="breadcrumb-item"><a href="#">Home</a></li>
                            <li class="breadcrumb-item active">Dashboard v3</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>
        <div class="app-content">
            <div class="container-fluid">
                <div class="row">

                        <!-- Product Shipped Card -->
                        <div class="card mb-4 mx-4">
                            <div class="card-header">
                                <div class="d-flex">
                                    <h3 class="card-title">Gross Revenue: </h3>
                                    <h3 class = "card-title ms-1" id = "rev"></h3>
                                </div>
                            </div>
                            <div class="card-body">
                                
                                <div class = "row">
                                    <div class="col-3"></div>
                                <div class="chart-container col-6">
                                    <canvas id="revenue"></canvas>
                                </div>
                                <div class="col-3"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Top Products Sold -->
                        <div class="card mb-4 h-100 mx-4" >
                            <div class="card-header">
                                <h3 class="card-title">Top 20 Products Sold</h3>
                                
                            </div>
                            <div class="card-body">
                                <div class = "row">
                                    <div class="col-3"></div>
                                <div class="chart-container col-5">
                                    <canvas id="mostSold"></canvas>
                                </div>
                                <div class="col-4"></div>
                                </div>
                            </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="container-fluid">
            <p>&copy; 2025 Company, Inc. All rights reserved.</p>
        </div>
