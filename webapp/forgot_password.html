<!doctype html>
<html lang="en">
    <head>
        <title>Forgot Password</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <link rel="stylesheet" href = "css/styles.css" />
    </head>
    <body>
        <div id="header"></div>
        <div class="container mt-5">
            <h2 class="text-center">Forgot Password</h2>
            <form id="forgotPasswordForm">
                <!-- Username Input -->
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter your username" required />
                </div>
                <!-- Send Email Button -->
                <button type="button" class="btn btn-primary mb-3" id="sendEmail">Send Email</button>
                <p class="hidden text-success mb-0"  style="font-size: 1.1rem;" id = "emailSent">
                    <i class="fas fa-check-circle"></i> Email sent! Please check your inbox.
                    </p>

                <!-- Code Input -->
                <div class="mb-3">
                    <label for="code" class="form-label">Verification Code</label>
                    <input type="text" class="form-control" id="code" placeholder="Enter the code" required />
                </div>
                <!-- Submit Code Button -->
                

                <!-- Password Inputs (Initially Hidden) -->
                <div id="passwordSection" class="mt-4">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required />
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password" required />
                    </div>
                    <button class="btn btn-primary" id = "resetPassword">Reset Password</button>
                    <p class="hidden text-success mb-0"  style="font-size: 1.1rem;" id = "passwordReset">
                        <i class="fas fa-check-circle"></i> Password changed!
                        </p>
                        <p class="hidden text-danger mb-0"  style="font-size: 1.1rem;" id = "errorPassword">
                            <i class="fas fa-rectangle-xmark"></i> Something went wrong! Please try again.
                            </p>

                </div>
            </form>
        </div>

        <!-- jQuery and Bootstrap JavaScript -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        
        <script src = "js/scripts.js"></script>
        <script src = "js/forgot_password.js"></script>
    </body>
</html>
