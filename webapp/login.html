<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- External Scripts and Styles -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.4.2/css/all.css" />
    <script src="js/scripts_nologin.js"></script>
    <script src="js/login.js"></script>
    <link href = "css/styles.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />

    <!-- Custom Styles -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f8fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 50%;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            color: #333;
        }

        .login-container input[type="text"],
        .login-container input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        .login-container input[type="text"]:focus,
        .login-container input[type="password"]:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.6);
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-container button:hover {
            background-color: #45a049;
        }

        .login-container .footer-text {
            text-align: center;
            margin-top: 20px;
        }

        .login-container .footer-text a {
            text-decoration: none;
            color: #4CAF50;
        }

        .login-container .footer-text a:hover {
            color: #45a049;
        }

        .login-container .icon {
            display: block;
            text-align: center;
            font-size: 5rem;
            color: #4CAF50;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<!-- Icon -->


<!-- Login Form -->
<div class="login-container">
    <i class="fa fa-lock icon"></i>
    
    <h2>Login</h2>
    <form method="post" id="loginform">
        <input type="text" name="username" placeholder="Username" required class = "my-5">
        <input type="password" name="password" placeholder="Password" required>
        <p class="hidden text-danger mb-0"  style="font-size: 1.1rem;">
            <i class="fas fa-rectangle-xmark"></i> Wrong password
            </p>
        <button type="submit">Login</button>
        
    </form>

    <!-- Footer Text -->
    <div class="footer-text">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>
</div>

<script>
    login(document.querySelector("#loginform"));
</script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</body>

</html>
