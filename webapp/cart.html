<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.4.2/css/all.css"/>

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
</head>

<body>
  <!-- Global loading spinner -->
<div id="globalSpinner" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.6); z-index:9999; justify-content:center; align-items:center;">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

  <div id="header"></div>
    <main>
        <section class="h-100 h-custom" style="background-color: #d2c9ff;">
            <div class="container py-5 h-100">
              <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-12">
                  <div class="card card-registration card-registration-2" style="border-radius: 15px;">
                    <div class="card-body p-0">
                      <div class="row g-0">
                        <div class="col-lg-8">
                          <div class="p-5">
                            <div class="d-flex justify-content-between align-items-center mb-5">
                              <h1 class="fw-bold mb-0">Shopping Cart</h1>

                            </div>
                            
                            <div id = "productContainer">
                              There's nothing here! Try <a href = "login.html" class = "link-info">logging in</a>, or if you have, try <a href = "search.html" class = "link-info">adding some products</a> to your cart.
                            </div>
          
                            <div class="pt-5">
                              <h6 class="mb-0"><a href="#!" class="text-body"><i
                                    class="fas fa-long-arrow-alt-left me-2"></i>Back to shop</a></h6>
                            </div>
                          </div>
                        </div>
                        <div class="col-lg-4 bg-body-tertiary">
                          <div class="p-5">
                            <h3 class="fw-bold mb-5 mt-2 pt-1">Summary</h3>
                            <hr class="my-4">
          
                            <div class="d-flex justify-content-between mb-4">
                              <h5 class="text-uppercase" id = "products"></h5>

                            </div>
          


          
                            <h5 class="text-uppercase mb-3">Give code</h5>
          
                            <div class="mb-5">
                              <div data-mdb-input-init class="form-outline">
                                <input type="text" id="form3Examplea2" class="form-control form-control-lg" />
                                <label class="form-label" for="form3Examplea2" >Enter your code</label>
                              </div>
                            </div>
                            <div class="mb-4">
                              <h5 class="text-uppercase mb-3">Payment Options (current outage on digital payment)</h5>
                              <select class="form-select form-select-lg mb-3" id="payment-options">
                                  <option selected disabled>Select a payment method</option>
                                  
                                  <option value="cash-on-delivery">Cash on Delivery</option>
                              </select>
                          </div>
                          
                          <div class="mb-4">
                              <h5 class="text-uppercase mb-3">Delivery Options</h5>
                              <select class="form-select form-select-lg mb-3" id="delivery-options">
                                  <option selected disabled>Select a delivery method</option>
                                  <option value="standard">Standard Delivery (3-5 days)</option>
                                  <option value="express">Express Delivery (1-2 days)</option>
                                  <option value="pickup">Pickup from Store</option>
                              </select>
                          </div>
          
                            <hr class="my-4">
          
                            <div class="d-flex justify-content-between mb-5">
                              <h5 class="text-uppercase">Total price</h5>
                              <h5 id = "price"></h5>
                            </div>
          
                            <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-dark btn-block btn-lg"
                              data-mdb-ripple-color="dark" id = "checkout">Checkout</button>
          
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

    </main>

    <footer>

        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="js/scripts.js"></script>
    <script src="js/cart.js"></script>
    <script>
      $(document).ready(function () {
        // Fetch the header
        fetch('header.html').then(res => res.text()).then((res) => { $("#header").html(res) }).then((res)=>{loadUsername()})

        // Password Change Handler

    });
        cartLoad(getToken());
        loadCheckout()
        // You can now use the cart object to update the DOM as needed


    </script>
</body>

</html>
