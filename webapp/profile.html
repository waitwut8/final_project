<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Edit Profile - Modern Design</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css">

    <!-- Custom Styles -->
    <style>
        body {
            margin-top: 20px;
            background-color: #f4f6fb;
            color: #4a4e69;
        }

        .img-account-profile {
            height: 10rem;
            width: 10rem;
            object-fit: cover;
            border: 4px solid #5c7cfa;
            margin-bottom: 1rem;
        }

        .rounded-circle {
            border-radius: 50% !important;
        }

        .card {
            box-shadow: 0 0.15rem 1.75rem 0 rgb(33 40 50 / 15%);
            border: none;
            border-radius: 1rem;
        }

        .card-header {
            background-color: transparent;
            font-weight: 600;
            border-bottom: none;
            font-size: 1.2rem;
        }

        .form-control {
            border-radius: 0.5rem;
            font-size: 1rem;
            padding: 0.75rem 1rem;
        }

        .btn-primary {
            background: #5c7cfa;
            border: none;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #4c6ef5;
        }

        .form-section {
            padding: 2rem;
        }

        .input-group .form-control {
            border-radius: 0.5rem 0 0 0.5rem;
        }

        .input-group .btn {
            border-radius: 0 0.5rem 0.5rem 0;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #5c7cfa;
            margin-bottom: 1.5rem;
        }
    </style>
    <script src="https://unpkg.com/imagekit-javascript/dist/imagekit.min.js" type="text/javascript"></script>
</head>

<body>
<div class="container-xl px-4 mt-4">
    <!-- Header Placeholder -->
    <div id="header"></div>

    <hr class="mt-0 mb-4">

    <div class="row">
        <!-- Profile Picture Section -->
        <div class="col-xl-4 col-lg-5">
            <div class="card mb-4">
                <div class="card-header text-center">Profile Picture</div>
                <div class="card-body text-center">
                    <img class="img-account-profile rounded-circle mb-3" id="image" src="" alt="Profile Image">
                    <div class="input-group mb-3">
                        <input type="file" class="form-control" id="file1">
                        <button class="btn btn-outline-secondary" type="button" id="upload">Upload</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Account Details Section -->
        <!-- Account Details Section -->
        <div class="col-xl-8 col-lg-7">
            <div class="card mb-4">
                <div class="card-header text-uppercase">
                    <i class="fas fa-user-circle"></i> Account Details
                </div>
                <div class="card-body form-section">
                    <form id="accountDetailsForm">
                        <div class="mb-4">
                            <label for="inputUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="inputUsername" placeholder="Enter your username" value="username" disabled>
                        </div>

                        <div class="row gx-3 mb-4">
                            <div class="col-md-6">
                                <label for="inputFirst" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="inputFirst" placeholder="Enter your first name" value="Valerie">
                            </div>
                            <div class="col-md-6">
                                <label for="inputLast" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="inputLast" placeholder="Enter your last name" value="Luna">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="inputEmail" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="inputEmail" placeholder="Enter your email address" value="name@example.com">
                        </div>

                        <div class="mb-4">
                            <label for="inputPhone" class="form-label">Phone Number</label>
                            <input type="text" class="form-control" id="inputPhone" placeholder="Enter your phone number" value="+1 234 567 890">
                        </div>

                        <button type="button" class="btn btn-primary w-100" id="save">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-12">
            <div class="card mb-4">
                <div class="card-header text-uppercase">
                    <i class="fas fa-key"></i> Change Password
                </div>
                <div class="card-body form-section">
                    <form id="changePasswordForm">
                        <div class="mb-4">
                            <label for="newPassword" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required>
                        </div>

                        <div class="mb-4">
                            <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirmNewPassword" placeholder="Confirm new password" required>
                        </div>
                        <p class="hidden text-success mb-0"  style="font-size: 1.1rem;" id = "yes">
                            <i class="fas fa-check-circle"></i> Password changed!
                            </p>
                            <p class="hidden text-danger mb-0"  style="font-size: 1.1rem;" id = "no">
                                <i class="fas fa-rectangle-xmark"></i> Passwords do not match
                                </p>
                        <button type="button" class="btn btn-primary w-100" id="changePassword">Change Password</button>
                    </form>
                </div>
            </div>
        </div>


    </div>
</div>

<!-- Password Change Section -->
<!-- Change Password Section -->


<!-- Bootstrap Bundle (with Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

<!-- Lodash -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/scripts.js"></script>
<script src="js/profile.js"></script>

<script>
    $(document).ready(function () {
        // Fetch the header
        fetch('header.html').then(res => res.text()).then((res) => { $("#header").html(res) }).then((res)=>{loadUsername()})

        // Password Change Handler

    });
</script>

</body>
</html>
